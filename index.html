<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="controls">
      <span class="title">Timeline</span>
      <div class="control-group">
        <span class="control-label">Colors</span>
        <div id="palette-swatches" class="palette-swatches"></div>
      </div>
      <label class="control-group">
        <input type="checkbox" id="today-toggle" />
        <span class="control-label">Show Today</span>
      </label>
      <div class="header-actions">
        <button id="example-btn" class="action-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Example CSV
        </button>
        <button id="upload-btn" class="action-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload CSV
        </button>
        <input
          id="upload-input"
          type="file"
          accept=".csv"
          style="display: none"
        />
        <button id="export-btn" class="action-btn">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export SVG
        </button>
      </div>
    </div>

    <div id="timeline-wrapper">
      <div id="empty-state">Load a CSV to see your timeline.</div>
      <div id="timeline" style="display: none"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
